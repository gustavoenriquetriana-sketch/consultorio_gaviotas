{% extends 'base.html' %}

{% block title %}Las Gaviotas - {{ titulo_accion }}{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card" style="border-top-color: #c0392b; max-width: 600px;">
        <h2 style="color: #c0392b; text-align: left; margin-bottom: 10px;">{{ titulo_accion }}</h2>
        <p class="subtitle" style="text-align: left; margin-bottom: 20px;">Confirmación de Acción Reversible / Irreversible</p>

        <!-- Mensaje de Advertencia -->
        <div style="background-color: #fcedec; border-left: 5px solid #eb5757; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
            <p style="color: #2c3e50; font-size: 1.05rem; line-height: 1.5; font-weight: 500;">
                {{ mensaje }}
            </p>
            <p style="color: #7f8c8d; font-size: 0.85rem; margin-top: 10px; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">
                <i class="bi bi-exclamation-triangle-fill" style="color: #eb5757;"></i> Atención: Verifique antes de proceder.
            </p>
        </div>

        <!-- Formulario de Confirmación POST -->
        <form method="post">
            {% csrf_token %}
            
            <div style="display: flex; gap: 15px; justify-content: flex-end; flex-wrap: wrap;">
                <a href="{{ url_cancelar }}" class="btn" style="background-color: #95a5a6; width: auto; min-width: 120px; font-weight: 600; padding: 12px 25px;">
                    Cancelar
                </a>
                <button type="submit" class="btn" style="background-color: #c0392b; width: auto; min-width: 150px; font-weight: 600; padding: 12px 25px;">
                    Confirmar y Guardar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
